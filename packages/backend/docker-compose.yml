services:
  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - '3000:3000'

  backend:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ../..:/app
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile &&
      pnpm --filter @zii/backend start"
    environment:
      PORT: '8787'
      GOTENBERG_URL: http://gotenberg:3000
      CORS_ORIGIN: '*'
    ports:
      - '8787:8787'
    depends_on:
      - gotenberg
