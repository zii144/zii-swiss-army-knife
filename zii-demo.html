<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zii — Swiss Army Knife (demo)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      :root {
        --bg: #ffffff; --fg: #0b0d12; --muted: #5b6472;
        --border: #d7dce3; --accent: #0369a1;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body.dark {
        --bg: #0b0d12; --fg: #e6e9ef; --muted: #95a0b1;
        --border: #1f2733; --accent: #7dd3fc;
      }
      * { box-sizing: border-box; }
      body { background: var(--bg); color: var(--fg); margin: 0; }
      .app { max-width: 720px; margin: 0 auto; padding: 1.5rem; min-height: 100vh; }
      header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
      .title { background: none; border: none; color: var(--fg); font-size: 1.25rem; font-weight: 700; cursor: pointer; padding: 0; }
      .controls { display: flex; gap: .75rem; align-items: center; }
      input, select, button { background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .55rem; font: inherit; }
      button { cursor: pointer; }
      .filters { margin: 1rem 0; display: flex; gap: .75rem; align-items: center; }
      .search { flex: 1; }
      .count { color: var(--muted); font-size: .85rem; }
      .list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .5rem; }
      .item { width: 100%; text-align: left; display: flex; align-items: center; gap: .75rem; border: 1px solid var(--border); border-radius: 8px; padding: .7rem .85rem; }
      .item:hover { border-color: var(--accent); }
      .item-name { font-weight: 600; }
      .item-cat { color: var(--muted); font-size: .75rem; }
      .badge { margin-left: auto; border: 1px solid var(--accent); color: var(--accent); border-radius: 999px; padding: .05rem .5rem; font-size: .72rem; }
      .tool { display: flex; flex-direction: column; gap: .75rem; }
      .back { align-self: flex-start; background: none; border: none; color: var(--accent); padding: .2rem 0; }
      .tool h2 { margin: 0; font-size: 1.1rem; }
      .desc { color: var(--muted); margin: 0; font-size: .9rem; }
      .field { display: flex; flex-direction: column; gap: .35rem; font-size: .85rem; color: var(--muted); }
      .field input[type=text], .field select { max-width: 24rem; }
      .actions { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; margin-top: .3rem; }
      .primary { background: var(--accent); color: var(--bg); border: none; font-weight: 600; padding: .45rem .9rem; }
      .primary:disabled { opacity: .5; cursor: not-allowed; }
      .hint { color: var(--muted); font-size: .85rem; margin: 0; }
      .err { color: #ef4444; font-size: .85rem; margin: 0; }
      .result { display: flex; flex-direction: column; gap: .6rem; align-items: flex-start; border-top: 1px solid var(--border); padding-top: .9rem; margin-top: .3rem; }
      .preview { max-width: 100%; max-height: 18rem; border: 1px solid var(--border); border-radius: 8px; }
      .qrbox { background: #fff; padding: .6rem; border-radius: 8px; }
      .hidden { display: none; }
    </style>
  </head>
  <body class="dark">
    <div class="app">
      <header>
        <button class="title" id="home">Zii — Swiss Army Knife</button>
        <div class="controls">
          <select id="lang" aria-label="Language">
            <option value="en">English</option>
            <option value="zh">繁體中文</option>
          </select>
          <button id="darkBtn">Dark: on</button>
        </div>
      </header>
      <div id="view"></div>
    </div>

    <script>
      const { PDFDocument } = PDFLib;
      let lang = 'en';

      const T = {
        en: {
          subtitle: '3 tools · all run on your device',
          tools: 'tools', offline: 'offline', back: '← Back to tools',
          pdfName: 'Merge PDF', pdfCat: 'pdf',
          pdfDesc: 'Combine several PDFs into one, in the order you add them.',
          pdfPick: 'Choose PDF files', pdfBtn: 'Merge', pdfNone: 'Add two or more PDFs.',
          pdfDone: 'Merged PDF ready.', pdfDl: 'Download merged.pdf',
          imgName: 'Convert image', imgCat: 'image',
          imgDesc: 'Convert between PNG, JPEG and WebP. Source format auto-detected.',
          imgPick: 'Choose an image', imgTo: 'Convert to', imgBtn: 'Convert',
          imgNone: 'Choose an image first.', imgDone: 'Converted image ready.', imgDl: 'Download',
          qrName: 'QR code generator', qrCat: 'generator',
          qrDesc: 'Turn any text or URL into a QR code.',
          qrLabel: 'Text or URL', qrBtn: 'Generate', qrDone: 'QR code ready.', qrDl: 'Download qr.png',
        },
        zh: {
          subtitle: '3 個工具 · 全部在裝置上執行',
          tools: '個工具', offline: '離線', back: '← 返回工具列表',
          pdfName: '合併 PDF', pdfCat: 'pdf',
          pdfDesc: '依加入順序將多個 PDF 合併成一個檔案。',
          pdfPick: '選擇 PDF 檔案', pdfBtn: '合併', pdfNone: '請加入兩個以上的 PDF。',
          pdfDone: '合併完成。', pdfDl: '下載 merged.pdf',
          imgName: '影像轉檔', imgCat: 'image',
          imgDesc: '於 PNG、JPEG、WebP 之間轉換，來源格式自動辨識。',
          imgPick: '選擇影像', imgTo: '轉換成', imgBtn: '轉換',
          imgNone: '請先選擇影像。', imgDone: '轉換完成。', imgDl: '下載',
          qrName: 'QR Code 產生器', qrCat: 'generator',
          qrDesc: '將任何文字或網址轉成 QR Code。',
          qrLabel: '文字或網址', qrBtn: '產生', qrDone: 'QR Code 完成。', qrDl: '下載 qr.png',
        },
      };
      const t = (k) => T[lang][k];
      const view = document.getElementById('view');

      const TOOLS = [
        { id: 'pdf', name: 'pdfName', cat: 'pdfCat', render: renderPdf },
        { id: 'img', name: 'imgName', cat: 'imgCat', render: renderImg },
        { id: 'qr', name: 'qrName', cat: 'qrCat', render: renderQr },
      ];

      function download(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      }

      function home() {
        view.innerHTML = '';
        const filters = document.createElement('div');
        filters.className = 'filters';
        filters.innerHTML = `<input class="search" type="search" placeholder="${lang==='en'?'Search tools…':'搜尋工具…'}" />
          <span class="count">3 ${t('tools')}</span>`;
        const ul = document.createElement('ul');
        ul.className = 'list';
        const draw = (q='') => {
          ul.innerHTML = '';
          TOOLS.filter(x => t(x.name).toLowerCase().includes(q.toLowerCase())).forEach(x => {
            const li = document.createElement('li');
            const b = document.createElement('button');
            b.className = 'item';
            b.innerHTML = `<span class="item-name">${t(x.name)}</span><span class="item-cat">${t(x.cat)}</span><span class="badge">${t('offline')}</span>`;
            b.onclick = () => x.render();
            li.appendChild(b); ul.appendChild(li);
          });
        };
        filters.querySelector('.search').oninput = (e) => draw(e.target.value);
        view.appendChild(filters); view.appendChild(ul); draw();
      }

      function toolShell(nameKey, descKey) {
        view.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'tool';
        const back = document.createElement('button');
        back.className = 'back'; back.textContent = t('back'); back.onclick = home;
        const h = document.createElement('h2'); h.textContent = t(nameKey);
        const d = document.createElement('p'); d.className = 'desc'; d.textContent = t(descKey);
        wrap.append(back, h, d);
        view.appendChild(wrap);
        return wrap;
      }

      function renderPdf() {
        const w = toolShell('pdfName', 'pdfDesc');
        let files = [];
        w.insertAdjacentHTML('beforeend', `
          <label class="field"><span>${t('pdfPick')}</span><input id="pf" type="file" accept="application/pdf" multiple /></label>
          <p class="hint" id="pfsel"></p>
          <div class="actions"><button class="primary" id="pbtn" disabled>${t('pdfBtn')}</button><span class="hint" id="pnone">${t('pdfNone')}</span></div>
          <p class="err hidden" id="perr"></p>
          <div class="result hidden" id="pres"><p class="hint">${t('pdfDone')}</p><button class="primary" id="pdl">${t('pdfDl')}</button></div>`);
        const btn = w.querySelector('#pbtn');
        w.querySelector('#pf').onchange = (e) => {
          files = [...e.target.files];
          w.querySelector('#pfsel').textContent = files.length ? `${files.length} ${lang==='en'?'file(s) selected':'個檔案'}` : '';
          btn.disabled = files.length < 2;
          w.querySelector('#pnone').classList.toggle('hidden', files.length >= 2);
          w.querySelector('#pres').classList.add('hidden');
        };
        btn.onclick = async () => {
          w.querySelector('#perr').classList.add('hidden');
          try {
            const out = await PDFDocument.create();
            for (const f of files) {
              const src = await PDFDocument.load(await f.arrayBuffer());
              const pages = await out.copyPages(src, src.getPageIndices());
              pages.forEach(p => out.addPage(p));
            }
            const bytes = await out.save();
            const res = w.querySelector('#pres'); res.classList.remove('hidden');
            w.querySelector('#pdl').onclick = () => download(new Blob([bytes], {type:'application/pdf'}), 'merged.pdf');
          } catch (err) {
            const e = w.querySelector('#perr'); e.textContent = String(err.message||err); e.classList.remove('hidden');
          }
        };
      }

      function renderImg() {
        const w = toolShell('imgName', 'imgDesc');
        let file = null;
        w.insertAdjacentHTML('beforeend', `
          <label class="field"><span>${t('imgPick')}</span><input id="if" type="file" accept="image/*" /></label>
          <label class="field"><span>${t('imgTo')}</span><select id="ifmt"><option value="image/png">PNG</option><option value="image/jpeg" selected>JPEG</option><option value="image/webp">WEBP</option></select></label>
          <div class="actions"><button class="primary" id="ibtn" disabled>${t('imgBtn')}</button><span class="hint" id="inone">${t('imgNone')}</span></div>
          <p class="err hidden" id="ierr"></p>
          <div class="result hidden" id="ires"><p class="hint">${t('imgDone')}</p><img class="preview" id="iprev" alt="result" /><button class="primary" id="idl">${t('imgDl')}</button></div>`);
        const btn = w.querySelector('#ibtn');
        w.querySelector('#if').onchange = (e) => {
          file = e.target.files[0] || null; btn.disabled = !file;
          w.querySelector('#inone').classList.toggle('hidden', !!file);
        };
        btn.onclick = () => {
          w.querySelector('#ierr').classList.add('hidden');
          const mime = w.querySelector('#ifmt').value;
          const img = new Image();
          img.onload = () => {
            const c = document.createElement('canvas');
            c.width = img.naturalWidth; c.height = img.naturalHeight;
            const ctx = c.getContext('2d');
            if (mime === 'image/jpeg') { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,c.width,c.height); }
            ctx.drawImage(img, 0, 0);
            c.toBlob((blob) => {
              if (!blob) { const e=w.querySelector('#ierr'); e.textContent='Format not supported by this browser'; e.classList.remove('hidden'); return; }
              const ext = mime.split('/')[1];
              const res = w.querySelector('#ires'); res.classList.remove('hidden');
              w.querySelector('#iprev').src = URL.createObjectURL(blob);
              w.querySelector('#idl').textContent = `${t('imgDl')} .${ext}`;
              w.querySelector('#idl').onclick = () => download(blob, `converted.${ext}`);
            }, mime, 0.85);
          };
          img.onerror = () => { const e=w.querySelector('#ierr'); e.textContent='Could not read image'; e.classList.remove('hidden'); };
          img.src = URL.createObjectURL(file);
        };
      }

      function renderQr() {
        const w = toolShell('qrName', 'qrDesc');
        w.insertAdjacentHTML('beforeend', `
          <label class="field"><span>${t('qrLabel')}</span><input id="qt" type="text" placeholder="https://zii.app" /></label>
          <div class="actions"><button class="primary" id="qbtn" disabled>${t('qrBtn')}</button></div>
          <div class="result hidden" id="qres"><p class="hint">${t('qrDone')}</p><div class="qrbox" id="qbox"></div><button class="primary" id="qdl">${t('qrDl')}</button></div>`);
        const btn = w.querySelector('#qbtn');
        w.querySelector('#qt').oninput = (e) => { btn.disabled = e.target.value.trim().length === 0; };
        btn.onclick = () => {
          const text = w.querySelector('#qt').value.trim();
          const box = w.querySelector('#qbox'); box.innerHTML = '';
          new QRCode(box, { text, width: 192, height: 192, correctLevel: QRCode.CorrectLevel.M });
          w.querySelector('#qres').classList.remove('hidden');
          setTimeout(() => {
            const canvas = box.querySelector('canvas');
            w.querySelector('#qdl').onclick = () => canvas && canvas.toBlob((b) => download(b, 'qr.png'), 'image/png');
          }, 60);
        };
      }

      document.getElementById('home').onclick = home;
      document.getElementById('darkBtn').onclick = () => {
        const dark = document.body.classList.toggle('dark');
        document.getElementById('darkBtn').textContent = `Dark: ${dark ? 'on' : 'off'}`;
      };
      document.getElementById('lang').onchange = (e) => { lang = e.target.value; home(); };
      home();
    </script>
  </body>
</html>
