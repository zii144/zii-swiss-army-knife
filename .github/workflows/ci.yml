name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: License scan (no AGPL/GPL)
        run: pnpm check:licenses
      - name: Production audit (high+)
        run: pnpm check:audit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter @zii/app exec playwright install --with-deps chromium
      - name: E2E (headless — every tool loads + functional spot-checks)
        run: pnpm --filter @zii/app test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
